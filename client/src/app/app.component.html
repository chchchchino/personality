<div class="page-wrap min-vh-100 py-4 py-md-5">
  <div class="container" style="max-width: 720px">
    <header class="text-center mb-4 mb-md-5">
      <h1 class="display-5 fw-bold mb-2">Personality Translator</h1>
      <p class="lead text-secondary mb-0">
        Rephrase your words in the voice of someone from history or pop culture.
      </p>
    </header>

    <div class="card shadow-sm border-0">
      <div class="card-body p-4 p-md-5">
        <form (ngSubmit)="onSubmit()" #form="ngForm">
          <div class="mb-4">
            <label for="personality" class="form-label fw-semibold">Personality</label>
            <input
              id="personality"
              type="text"
              class="form-control form-control-lg"
              placeholder="e.g. Winston Churchill, Shakespeare, your favorite celebrity..."
              [(ngModel)]="personality"
              name="personality"
              required
            />
          </div>

          <div class="mb-4">
            <label for="words" class="form-label fw-semibold">Your words</label>
            <textarea
              id="words"
              class="form-control form-control-lg"
              rows="5"
              placeholder="Type anything you want rephrased..."
              [(ngModel)]="userWords"
              name="words"
              required
            ></textarea>
          </div>

          <button
            type="submit"
            class="btn btn-primary btn-lg w-100"
            [disabled]="loading || !personality.trim() || !userWords.trim()"
          >
            @if (loading) {
              <span
                class="spinner-border spinner-border-sm me-2"
                role="status"
                aria-hidden="true"
              ></span>
              Translating…
            } @else {
              Translate
            }
          </button>
        </form>
      </div>
    </div>

    @if (resultText) {
      <div class="card shadow-sm border-0 mt-4 border-success border-2">
        <div class="card-header bg-success-subtle fw-semibold">Translation</div>
        <div class="card-body">
          <p class="mb-0 fs-5 result-text">{{ resultText }}</p>
        </div>
      </div>
    }

    @if (errorText) {
      <div class="alert alert-danger mt-4 mb-0" role="alert">
        {{ errorText }}
      </div>
    }
  </div>
</div>
